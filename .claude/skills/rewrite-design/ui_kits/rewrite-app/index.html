<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Re:Write — App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #app { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="AuthScreen.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="EditorScreen.jsx"></script>
<script type="text/babel">
  function App() {
    const [screen, setScreen] = React.useState("login");
    const [story, setStory] = React.useState(null);


    return (
      <>
        {screen === "login" && <AuthScreen onLogin={() => setScreen("dashboard")} />}
        {screen === "dashboard" && (
          <DashboardScreen
            onOpenStory={(s) => { setStory(s); setScreen("editor"); }}
            onSignOut={() => setScreen("login")}
          />
        )}
        {screen === "editor" && <EditorScreen story={story} onBack={() => setScreen("dashboard")} />}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
