<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Greens" subtitle="Deep teal-green surface palette" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--rw-bg-base); padding:20px; font-family:var(--rw-font-sans); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:8px; height:84px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-shadow:var(--rw-shadow-card); }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; opacity:0.7; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--rw-dark-green); color:#fff;"><span class="name">Dark Green</span><span class="hex">#02353c</span></div>
  <div class="sw" style="background:var(--rw-dark-green-highlight); color:#fff;"><span class="name">Green Highlight</span><span class="hex">#044c56</span></div>
  <div class="sw" style="background:var(--rw-dark-mint-green); color:#fff;"><span class="name">Dark Mint (bg)</span><span class="hex">#3b4c49</span></div>
  <div class="sw" style="background:var(--rw-dark-page); color:#fff;"><span class="name">Dark Page</span><span class="hex">#3c3c3c</span></div>
</div>
</body>
</html>
