<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & Shadow" subtitle="Pill rounding scale + the one card shadow" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--rw-bg-base); padding:24px; font-family:var(--rw-font-sans); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .box { background:var(--rw-mint-green); width:120px; height:70px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#000; box-shadow:var(--rw-shadow-card); }
  .lbl { font-size:11px; color:var(--rw-light-gray); margin-top:8px; }
  .c { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body>
<div class="row">
  <div class="c"><div class="box" style="border-radius:var(--rw-radius-card);">10px</div><span class="lbl">card</span></div>
  <div class="c"><div class="box" style="border-radius:var(--rw-radius-input);">20px</div><span class="lbl">input / pill</span></div>
  <div class="c"><div class="box" style="border-radius:var(--rw-radius-pill);">30px</div><span class="lbl">button / toolbar</span></div>
  <div class="c"><div class="box" style="border:3px solid #000; border-radius:var(--rw-radius-pill);">3px border</div><span class="lbl">hard border</span></div>
</div>
</body>
</html>
