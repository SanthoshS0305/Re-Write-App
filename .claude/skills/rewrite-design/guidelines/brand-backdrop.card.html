<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; }
  .stage { position:relative; height:240px; background:var(--rw-dark-mint-green); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .stage img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.4; }
  .logo { position:relative; font-family:var(--rw-font-display); font-size:72px; line-height:1; }
</style></head>
<body>
<div class="stage">
  <img src="../assets/forest_bg.jpg" alt="" />
  <div class="logo"><span style="color:var(--rw-aqua)">Re</span><span style="color:var(--rw-mint-green)">:</span><span style="color:var(--rw-light-gray)">Write</span></div>
</div>
</body>
</html>
