<!-- @dsCard group="Spacing" viewport="700x120" name="Spacing Scale" subtitle="5 · 10 · 16 · 20 · 30 · 40 px" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--rw-bg-base); padding:24px; font-family:var(--rw-font-sans); display:flex; gap:14px; align-items:flex-end; }
  .c { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:var(--rw-aqua); width:100%; border-radius:3px; }
  .lbl { font-size:11px; color:var(--rw-light-gray); }
</style></head>
<body>
<div class="c" style="width:40px;"><div class="bar" style="height:5px;"></div><span class="lbl">5</span></div>
<div class="c" style="width:40px;"><div class="bar" style="height:10px;"></div><span class="lbl">10</span></div>
<div class="c" style="width:40px;"><div class="bar" style="height:16px;"></div><span class="lbl">16</span></div>
<div class="c" style="width:40px;"><div class="bar" style="height:20px;"></div><span class="lbl">20</span></div>
<div class="c" style="width:40px;"><div class="bar" style="height:30px;"></div><span class="lbl">30</span></div>
<div class="c" style="width:40px;"><div class="bar" style="height:40px;"></div><span class="lbl">40</span></div>
</body>
</html>
