<!-- @dsCard group="Colors" viewport="700x130" name="Neutrals & Semantic" subtitle="Text neutrals, scene marker, danger" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--rw-bg-base); padding:20px; font-family:var(--rw-font-sans); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:8px; height:72px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-shadow:var(--rw-shadow-card); }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; opacity:0.7; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--rw-light-gray); color:#000;"><span class="name">Light Gray (text)</span><span class="hex">#f3f3f3</span></div>
  <div class="sw" style="background:#000; color:#fff;"><span class="name">Black (logo colon)</span><span class="hex">#000000</span></div>
  <div class="sw" style="background:var(--rw-scene-marker); color:#fff;"><span class="name">Scene Marker</span><span class="hex">#3b82f6</span></div>
  <div class="sw" style="background:var(--rw-danger); color:#fff;"><span class="name">Danger</span><span class="hex">#c0392b</span></div>
</div>
</body>
</html>
