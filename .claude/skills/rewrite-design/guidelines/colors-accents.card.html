<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--rw-dark-green); padding:20px; font-family:var(--rw-font-sans); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:8px; height:84px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; opacity:0.7; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--rw-aqua); color:#000;"><span class="name">Aqua</span><span class="hex">#3fd0c9</span></div>
  <div class="sw" style="background:var(--rw-mint-green); color:#000;"><span class="name">Mint Green</span><span class="hex">#c1f6ed</span></div>
  <div class="sw" style="background:var(--rw-green-highlight); color:#000;"><span class="name">Action Green</span><span class="hex">#34c18a</span></div>
  <div class="sw" style="background:var(--rw-green-lowlight); color:#000;"><span class="name">Low Green (link)</span><span class="hex">#2ca274</span></div>
</div>
</body>
</html>
