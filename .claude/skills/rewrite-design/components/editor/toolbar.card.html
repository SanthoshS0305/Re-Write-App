<!-- @dsCard group="Components" viewport="700x180" name="Editor Toolbar" subtitle="Formatting toolbar pill with Lucide icons" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style> body { margin: 0; background: var(--rw-bg-base); padding: 28px; } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toolbar, IconButton } = window.ReWriteDesignSystem_e1e021;
  const I = React.memo(function I({ name }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const el = ref.current; if (!el || !window.lucide) return;
      el.innerHTML = `<i data-lucide="${name}"></i>`;
      window.lucide.createIcons();
      const svg = el.querySelector("svg");
      if (svg) { svg.setAttribute("width", 18); svg.setAttribute("height", 18); svg.style.display = "block"; }
    }, [name]);
    return <span ref={ref} style={{ display: "inline-flex", width: 18, height: 18 }} />;
  });
  function Demo() {
    return (
      <Toolbar>
        <IconButton active><I name="bold" /></IconButton>
        <IconButton><I name="italic" /></IconButton>
        <IconButton><I name="underline" /></IconButton>
        <IconButton><I name="heading-1" /></IconButton>
        <IconButton><I name="list" /></IconButton>
        <IconButton><I name="list-ordered" /></IconButton>
        <IconButton><I name="link" /></IconButton>
        <IconButton style={{ marginLeft: "auto" }}><I name="undo-2" /></IconButton>
        <IconButton><I name="redo-2" /></IconButton>
      </Toolbar>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
